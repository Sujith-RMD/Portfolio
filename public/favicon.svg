		</filter>
	</defs>
	<rect x="2" y="2" width="60" height="60" rx="16" fill="url(#bg)" />
	<rect x="3" y="3" width="58" height="58" rx="15" fill="none" stroke="#f5c400" stroke-opacity="0.15" stroke-width="1" />
	<text
		x="32"
		y="44"
		text-anchor="middle"
		font-family="Inter, Arial, Helvetica, sans-serif"
		font-size="36"
		font-weight="900"
		letter-spacing="-2"
		fill="url(#s)"
		filter="url(#glow)"
	>
		S
	</text>
</svg>