<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" sizes="any" href="/favicon-s.svg" />
    <meta name="theme-color" content="#050505" />
    <title>404 — Lost in the Void | sujith.dev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
      :root { color-scheme: dark; }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #050505;
        color: #f3f3f3;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        overflow: hidden;
        position: relative;
      }

      /* Ambient glow */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(60% 50% at 50% 30%, rgba(245,196,0,0.1), transparent 65%),
          radial-gradient(30% 30% at 80% 70%, rgba(245,196,0,0.06), transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      /* Dot grid */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        background-image: radial-gradient(rgba(255,255,255,0.3) 0.4px, transparent 0.4px);
        background-size: 3px 3px;
        opacity: 0.12;
        pointer-events: none;
        z-index: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 2rem;
        max-width: 640px;
      }

      .error-code {
        font-family: 'Syne', sans-serif;
        font-size: clamp(100px, 25vw, 220px);
        font-weight: 800;
        letter-spacing: -0.04em;
        line-height: 0.85;
        background: linear-gradient(135deg, #f5c400, #ffe178, #f5c400);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 0 30px rgba(245,196,0,0.25));
        animation: pulse-glow 3s ease-in-out infinite;
        margin-bottom: 1.5rem;
      }

      @keyframes pulse-glow {
        0%, 100% { filter: drop-shadow(0 0 20px rgba(245,196,0,0.2)); }
        50% { filter: drop-shadow(0 0 40px rgba(245,196,0,0.35)); }
      }

      h1 {
        font-family: 'Syne', sans-serif;
        font-size: clamp(1.4rem, 4vw, 2rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 1rem;
        color: #fff;
      }

      p {
        color: #999;
        font-size: 0.95rem;
        line-height: 1.75;
        margin-bottom: 2.5rem;
        max-width: 440px;
        margin-left: auto;
        margin-right: auto;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        padding: 0.85rem 2rem;
        border-radius: 999px;
        border: 1px solid rgba(245,196,0,0.4);
        background: rgba(245,196,0,0.08);
        color: #f5c400;
        text-decoration: none;
        font-weight: 700;
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        position: relative;
        overflow: hidden;
      }

      .back-link::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(245,196,0,0.15), transparent);
        opacity: 0;
        transition: opacity 0.35s;
      }

      .back-link:hover {
        background: #f5c400;
        color: #050505;
        border-color: #f5c400;
        box-shadow: 0 0 30px rgba(245,196,0,0.3), 0 0 60px rgba(245,196,0,0.15);
        transform: translateY(-2px);
      }

      .back-link:hover::before { opacity: 1; }

      .back-link svg {
        transition: transform 0.3s;
      }

      .back-link:hover svg {
        transform: translateX(-3px);
      }

      /* Floating particles */
      .particle {
        position: fixed;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: rgba(245,196,0,0.4);
        pointer-events: none;
        z-index: 0;
        animation: float-particle linear infinite;
      }

      .particle:nth-child(1) { left: 15%; top: 80%; animation-duration: 8s; animation-delay: 0s; }
      .particle:nth-child(2) { left: 40%; top: 90%; animation-duration: 12s; animation-delay: 2s; width: 2px; height: 2px; }
      .particle:nth-child(3) { left: 65%; top: 85%; animation-duration: 10s; animation-delay: 4s; }
      .particle:nth-child(4) { left: 85%; top: 75%; animation-duration: 9s; animation-delay: 1s; width: 2px; height: 2px; }
      .particle:nth-child(5) { left: 25%; top: 95%; animation-duration: 11s; animation-delay: 3s; }
      .particle:nth-child(6) { left: 55%; top: 92%; animation-duration: 7s; animation-delay: 5s; width: 2px; height: 2px; }

      @keyframes float-particle {
        0% { transform: translateY(0) scale(1); opacity: 0; }
        10% { opacity: 0.6; }
        90% { opacity: 0.6; }
        100% { transform: translateY(-100vh) scale(0.3); opacity: 0; }
      }

      /* Scanline effect */
      .scanline {
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0,0,0,0.04) 2px,
          rgba(0,0,0,0.04) 4px
        );
        pointer-events: none;
        z-index: 2;
      }
    </style>
  </head>
  <body>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="scanline"></div>

    <div class="container">
      <div class="error-code">404</div>
      <h1>Lost in the Void</h1>
      <p>This route doesn't exist in my universe. The page you're looking for has either been moved, deleted, or never existed.</p>
      <a href="/" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back to Portfolio
      </a>
    </div>
  </body>
</html>
