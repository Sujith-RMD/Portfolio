<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | sujith.dev</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 50% 30%, rgba(245, 196, 0, 0.2), #050505 65%);
        color: #f3f3f3;
        font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif;
      }
      .card {
        width: min(620px, 92vw);
        padding: 2rem;
        border-radius: 22px;
        border: 1px solid #2a2a2a;
        background: rgba(12, 12, 12, 0.82);
        backdrop-filter: blur(8px);
      }
      h1 {
        margin: 0 0 0.6rem;
        font-family: Syne, Inter, sans-serif;
        font-size: clamp(2rem, 5vw, 3rem);
        letter-spacing: -0.02em;
      }
      p {
        margin: 0 0 1.2rem;
        color: #bdbdbd;
        line-height: 1.7;
      }
      a {
        display: inline-block;
        padding: 0.7rem 1.2rem;
        border-radius: 999px;
        border: 1px solid #f5c400;
        color: #f5c400;
        text-decoration: none;
        font-weight: 700;
      }
      a:hover {
        background: #f5c400;
        color: #050505;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Route Not Found</h1>
      <p>The page you requested is not available. Return to the home section and continue exploring the portfolio.</p>
      <a href="/">Go To Home</a>
    </div>
  </body>
</html>
